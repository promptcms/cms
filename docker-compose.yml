services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptcms
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    environment:
      SERVER_NAME: "${SERVER_NAME:-localhost}"
      APP_NAME: "${APP_NAME:-PromptCMS}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY:-}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-https://localhost}"
      DB_CONNECTION: "${DB_CONNECTION:-sqlite}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      CMS_DEFAULT_LOCALE: "${CMS_DEFAULT_LOCALE:-de}"
      CMS_ENABLE_MCP: "${CMS_ENABLE_MCP:-false}"
    volumes:
      - db-data:/app/database
      - storage-data:/app/storage/app
      - plugins-data:/app/plugins
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Optional: Queue worker for background jobs (media conversions, etc.)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptcms-queue
    restart: unless-stopped
    entrypoint: []
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --timeout=120
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY:-}"
      DB_CONNECTION: "${DB_CONNECTION:-sqlite}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      CACHE_STORE: "${CACHE_STORE:-database}"
    volumes:
      - db-data:/app/database
      - storage-data:/app/storage/app
      - plugins-data:/app/plugins
    depends_on:
      app:
        condition: service_healthy

volumes:
  db-data:
  storage-data:
  plugins-data:
  caddy-data:
  caddy-config:
